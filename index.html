<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Broccoletto · 1° anno</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
  :root{
    --rosa-fondo:#FDE7EE;
    --rosa-medio:#F7C8D8;
    --rosa-scuro:#8B4A5C;
    --giallo:#FFD93D;
    --giallo-scuro:#E8B92E;
    --verde:#6Fae6a;
    --verde-scuro:#4f8a4a;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;}
  body{
    font-family:'VT323',monospace;
    background:var(--rosa-fondo);
    color:var(--rosa-scuro);
    image-rendering:pixelated;
    touch-action:manipulation;
    user-select:none;
    position:fixed;width:100%;
  }
  .screen{
    position:absolute;inset:0;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    padding:24px;text-align:center;
    transition:opacity .5s ease;
  }
  .hidden{opacity:0;pointer-events:none;}

  /* ---------- SCHERMATA BUSTA ---------- */
  #s-busta .hint{
    font-size:22px;margin-top:28px;color:var(--rosa-scuro);
    animation:blink 1.6s steps(2) infinite;
  }
  @keyframes blink{50%{opacity:.35;}}
  .envelope{
    width:200px;height:140px;position:relative;cursor:pointer;
    animation:breathe 2.4s ease-in-out infinite;
  }
  @keyframes breathe{0%,100%{transform:scale(1);}50%{transform:scale(1.04);}}
  .env-body{
    position:absolute;inset:0;background:var(--giallo);
    border:6px solid var(--rosa-scuro);border-radius:4px;
    box-shadow:0 8px 0 rgba(139,74,92,.25);
  }
  .env-flap{
    position:absolute;top:-6px;left:-6px;right:-6px;
    height:0;border-left:106px solid transparent;border-right:106px solid transparent;
    border-top:74px solid var(--giallo-scuro);
    transform-origin:top;transition:transform .6s ease;z-index:3;
  }
  .env-heart{
    position:absolute;top:54px;left:50%;transform:translateX(-50%);
    font-size:34px;color:var(--rosa-scuro);z-index:2;
  }
  .env-letter{
    position:absolute;left:14px;right:14px;top:14px;bottom:14px;
    background:#fff;border:4px solid var(--rosa-medio);z-index:1;
    transition:transform .6s ease;
  }
  .envelope.open .env-flap{transform:rotateX(180deg);}
  .envelope.open .env-letter{transform:translateY(-160px);}

  /* ---------- LANDING CON SCELTE ---------- */
  #s-scelta .frase{
    font-family:'Press Start 2P',monospace;
    font-size:14px;line-height:1.9;max-width:340px;margin-bottom:40px;
    color:var(--rosa-scuro);
  }
  #s-scelta .frase b{color:var(--verde-scuro);}
  .scelte{display:flex;gap:16px;align-items:center;justify-content:center;flex-wrap:nowrap;width:100%;max-width:360px;}
  .btn{
    font-family:'Press Start 2P',monospace;
    border:4px solid var(--rosa-scuro);
    background:var(--giallo);color:var(--rosa-scuro);
    padding:14px 10px;border-radius:6px;cursor:pointer;
    box-shadow:0 5px 0 var(--giallo-scuro);
    transition:transform .3s ease,flex-grow .4s ease,box-shadow .15s ease,opacity .3s ease,padding .3s ease;
    font-size:14px;flex-grow:1;flex-basis:0;white-space:nowrap;
  }
  .btn:active{transform:translateY(3px);box-shadow:0 2px 0 var(--giallo-scuro);}
  .btn-si{background:var(--verde);box-shadow:0 5px 0 var(--verde-scuro);color:#fff;}
  .btn-tii{background:var(--rosa-medio);box-shadow:0 5px 0 #d99bb3;}

  /* ---------- MASCOTTE ---------- */
  #brocco{
    position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
    width:120px;height:140px;z-index:50;pointer-events:none;
    transition:transform .25s ease;
  }
  .pix{position:absolute;}
  /* gambo broccolo (al posto del vaso) */
  .gambo{bottom:0;left:48px;width:24px;height:42px;background:var(--verde-scuro);border-radius:0 0 6px 6px;}
  .gambo-l{bottom:8px;left:34px;width:16px;height:10px;background:var(--verde-scuro);border-radius:8px 0 0 8px;}
  .gambo-r{bottom:8px;left:70px;width:16px;height:10px;background:var(--verde-scuro);border-radius:0 8px 8px 0;}
  /* cespo: tante palline verdi a formare la cima frastagliata del broccolo */
  .ciuffo{bottom:38px;left:18px;width:84px;height:58px;background:var(--verde);border-radius:42px 42px 22px 22px;}
  .bub{background:var(--verde);border-radius:50%;}
  .bub.d{background:var(--verde-scuro);}
  .b1{bottom:84px;left:22px;width:24px;height:24px;}
  .b2{bottom:92px;left:40px;width:28px;height:28px;}
  .b3{bottom:88px;left:62px;width:24px;height:24px;}
  .b4{bottom:100px;left:30px;width:20px;height:20px;}
  .b5{bottom:100px;left:54px;width:22px;height:22px;}
  .b6{bottom:78px;left:14px;width:20px;height:20px;}
  .b7{bottom:78px;left:80px;width:20px;height:20px;}
  /* occhi e bocca cambiano per stato */
  .occhio{bottom:60px;width:13px;height:13px;background:#fff;border:2px solid #1a3a18;border-radius:50%;z-index:5;}
  .occhio.l{left:38px;} .occhio.r{left:64px;}
  .pupilla{width:5px;height:5px;background:#1a3a18;border-radius:50%;position:absolute;top:3px;left:3px;}
  .bocca{bottom:48px;left:52px;width:16px;height:6px;border-bottom:3px solid #1a3a18;z-index:5;}
  .lacrima{bottom:46px;width:6px;height:12px;background:#7fd0ff;border-radius:0 0 4px 4px;opacity:0;transition:opacity .3s;z-index:6;}
  .lacrima.l{left:40px;} .lacrima.r{left:66px;}
  /* pozzanghera di lacrime: cresce con i tap sul "no" */
  .pozza{bottom:-4px;left:50%;transform:translateX(-50%);width:0;height:0;background:#7fd0ff;opacity:.55;border-radius:50%;transition:width .5s ease,height .5s ease;z-index:1;}

  /* stati */
  #brocco.triste{transform:translateX(-50%) scale(.95);}
  #brocco.triste .occhio{height:14px;}
  #brocco.triste .bocca{border-bottom:none;border-top:3px solid #1a3a18;border-radius:50% 50% 0 0;bottom:42px;}
  #brocco.triste .lacrima{opacity:1;animation:drop 2.2s ease-in infinite;}
  @keyframes drop{0%{transform:translateY(0) scaleY(.6);opacity:0;}25%{opacity:1;}80%{transform:translateY(28px) scaleY(1.3);opacity:1;}100%{transform:translateY(34px) scaleY(1.3);opacity:0;}}
  #brocco.triste .lacrima.r{animation-delay:1.1s;}
  /* gioia A (si): salto */
  #brocco.gioiaA{animation:hop .4s ease infinite;}
  @keyframes hop{0%,100%{transform:translateX(-50%) translateY(0);}50%{transform:translateX(-50%) translateY(-22px);}}
  #brocco.gioiaA .bocca{width:22px;height:12px;border-bottom:4px solid #1a3a18;border-radius:0 0 12px 12px;left:49px;bottom:46px;}
  /* gioia B (tiii): dimena */
  #brocco.gioiaB{animation:wiggle .3s ease infinite;}
  @keyframes wiggle{0%,100%{transform:translateX(-50%) rotate(-6deg);}50%{transform:translateX(-50%) rotate(6deg);}}
  #brocco.gioiaB .bocca{width:24px;height:14px;border:3px solid #1a3a18;border-top:none;border-radius:0 0 14px 14px;left:48px;bottom:44px;background:#ff8fb0;}

  /* CELEBRAZIONE A (si): ingrandimento lento e composto, sorriso pieno, lieve ondeggio */
  #brocco.celebraA{
    animation:swayA 2s ease-in-out;
    transform:translateX(-50%) scale(2.4) translateY(-50px);
    transition:transform 2s cubic-bezier(.25,.8,.35,1);z-index:90;
  }
  @keyframes swayA{0%{filter:brightness(1);}100%{filter:brightness(1.12);}}
  #brocco.celebraA .bocca{width:26px;height:14px;border-bottom:4px solid #1a3a18;border-radius:0 0 14px 14px;left:47px;bottom:46px;}
  #brocco.celebraA .occhio{height:11px;border-radius:50% 50% 40% 40%;}
  /* CELEBRAZIONE B (tiii): ingrandimento con vibrazione gioiosa, boccona aperta rosa, occhi a CUORE */
  #brocco.celebraB{
    transform:translateX(-50%) scale(2.4) translateY(-50px);
    transition:transform 2s cubic-bezier(.34,1.3,.5,1);z-index:90;
  }
  #brocco.celebraB.anim{animation:bounceB 2s ease-in-out;}
  @keyframes bounceB{0%,100%{rotate:0deg;}20%{rotate:-5deg;}40%{rotate:5deg;}60%{rotate:-3deg;}80%{rotate:3deg;}}
  #brocco.celebraB .bocca{width:28px;height:20px;border:3px solid #1a3a18;border-top:none;border-radius:0 0 16px 16px;left:46px;bottom:40px;background:#ff8fb0;}
  /* occhi diventano cuori: nascondo il cerchio e mostro un carattere cuore (perfettamente simmetrico) */
  #brocco.celebraB .occhio{background:transparent;border:none;overflow:visible;}
  #brocco.celebraB .pupilla{display:none;}
  #brocco.celebraB .occhio::before{
    content:'♥';position:absolute;left:50%;top:50%;
    transform:translate(-50%,-50%);
    color:#e85b8a;font-size:16px;line-height:1;
  }
  #brocco.celebraB .occhio{animation:eyePop .5s ease infinite alternate;}
  @keyframes eyePop{from{transform:scale(1);}to{transform:scale(1.25);}}

  /* mascotte ATTIVA nella pagina dopo la scelta: torna a misura, in basso, continua a festeggiare */
  #brocco.attivoA{animation:hopActive .5s ease infinite;}
  @keyframes hopActive{0%,100%{transform:translateX(-50%) translateY(0) scale(1);}50%{transform:translateX(-50%) translateY(-14px) scale(1);}}
  #brocco.attivoA .bocca{width:22px;height:12px;border-bottom:4px solid #1a3a18;border-radius:0 0 12px 12px;left:49px;bottom:46px;}
  #brocco.attivoB{animation:wiggleActive .35s ease infinite;}
  @keyframes wiggleActive{0%,100%{transform:translateX(-50%) rotate(-5deg) scale(1);}50%{transform:translateX(-50%) rotate(5deg) scale(1);}}
  #brocco.attivoB .bocca{width:24px;height:14px;border:3px solid #1a3a18;border-top:none;border-radius:0 0 14px 14px;left:48px;bottom:44px;background:#ff8fb0;}
  /* nello stato attivo B mantengo gli occhi a cuore */
  #brocco.attivoB .occhio{background:transparent;border:none;overflow:visible;}
  #brocco.attivoB .pupilla{display:none;}
  #brocco.attivoB .occhio::before{
    content:'♥';position:absolute;left:50%;top:50%;
    transform:translate(-50%,-50%);
    color:#e85b8a;font-size:16px;line-height:1;
  }

  /* cuori al tocco */
  .heartfx{position:fixed;font-size:20px;pointer-events:none;z-index:60;animation:floatUp 1s ease-out forwards;}
  @keyframes floatUp{0%{transform:translate(-50%,-50%) scale(.6);opacity:1;}100%{transform:translate(-50%,-160%) scale(1.3);opacity:0;}}

  /* fumetto "Brokky offeso" (palette della stanza bambinesca) */
  .brokky-bubble{
    position:fixed;left:50%;bottom:172px;z-index:55;
    transform:translateX(-50%) translateY(8px) scale(.8);
    background:#fff;border:4px solid #9A4E68;border-radius:12px;
    padding:8px 12px;font-family:'Press Start 2P',monospace;font-size:10px;
    color:#9A4E68;white-space:nowrap;
    opacity:0;pointer-events:none;transition:opacity .3s ease,transform .3s ease;
  }
  .brokky-bubble.show{opacity:1;transform:translateX(-50%) translateY(0) scale(1);}
  .brokky-bubble::after{
    content:'';position:absolute;bottom:-12px;left:50%;transform:translateX(-50%);
    border:7px solid transparent;border-top-color:#9A4E68;
  }
</style>

<!-- SCHERMATA 1: BUSTA -->
<div class="screen" id="s-busta">
  <div class="envelope" id="env">
    <div class="env-letter"></div>
    <div class="env-body"></div>
    <div class="env-heart">♥</div>
    <div class="env-flap"></div>
  </div>
  <div class="hint">tocca per aprire</div>
</div>

<!-- SCHERMATA 2: SCELTA -->
<div class="screen hidden" id="s-scelta">
  <div class="frase">Siamo arrivati al primo anno.<br>Vuoi rinnovare per altri <b>67</b> anni la tua avventura con la mystery box chiamata <b>Broccoletto</b>?</div>
  <div class="scelte">
    <button class="btn btn-si" id="b-si">sì</button>
    <button class="btn btn-tii" id="b-tii">tiii</button>
    <button class="btn btn-no" id="b-no">no</button>
  </div>
</div>



<!-- MASCOTTE (presente da schermata 2) -->
<div id="brocco" class="hidden">
  <div class="pix ciuffo"></div>
  <div class="pix bub b6"></div>
  <div class="pix bub b7"></div>
  <div class="pix bub b1"></div>
  <div class="pix bub b3"></div>
  <div class="pix bub d b4"></div>
  <div class="pix bub d b5"></div>
  <div class="pix bub b2"></div>
  <div class="pix gambo"></div>
  <div class="pix gambo-l"></div>
  <div class="pix gambo-r"></div>
  <div class="pix occhio l"><div class="pupilla"></div></div>
  <div class="pix occhio r"><div class="pupilla"></div></div>
  <div class="pix bocca"></div>
  <div class="pix pozza" id="pozza"></div>
  <div class="pix lacrima l"></div>
  <div class="pix lacrima r"></div>
</div>

<!-- fumetto di Brokky quando il "no" sparisce (palette stanza bambinesca) -->
<div class="brokky-bubble" id="brokky-bubble">Brokky offeso</div>

<script>
const sBusta=document.getElementById('s-busta');
const sScelta=document.getElementById('s-scelta');
const env=document.getElementById('env');
const brocco=document.getElementById('brocco');
const bNo=document.getElementById('b-no'), bSi=document.getElementById('b-si'), bTii=document.getElementById('b-tii');
const brokkyBubble=document.getElementById('brokky-bubble');

// stato mascotte
function setMood(m){ brocco.className=m; }
let moodTimer;
function flashMood(m,ms=1200){ clearTimeout(moodTimer); setMood(m); if(ms) moodTimer=setTimeout(()=>setMood(''),ms); }

// apertura busta
env.addEventListener('click',()=>{
  env.classList.add('open');
  setTimeout(()=>{
    sBusta.classList.add('hidden');
    sScelta.classList.remove('hidden');
    brocco.classList.remove('hidden');
    setMood('');
  },700);
});

// "no" che rimpicciolisce e cede spazio agli altri (niente buco) - ora 5 tap
const NO_MAX=5;
const pozza=document.getElementById('pozza');
let noTaps=0;
bNo.addEventListener('click',e=>{
  e.stopPropagation();
  noTaps++;
  const scale=Math.max(0,1-noTaps*(1/NO_MAX));
  bNo.style.transform=`scale(${scale})`;
  bNo.style.flexGrow=Math.max(0,1-noTaps*(1.05/NO_MAX));
  bNo.style.opacity=scale<=0.15?0:1;
  // pozzanghera cresce in proporzione ai tap, satura all'ultimo
  const p=Math.min(1,noTaps/NO_MAX);
  pozza.style.width=(20+p*90)+'px';
  pozza.style.height=(6+p*16)+'px';
  if(scale<=0.15){
    bNo.style.padding='0';bNo.style.margin='0';bNo.style.width='0';bNo.style.flexBasis='0';bNo.style.pointerEvents='none';
    // il "no" e' sparito: Brokky resta offeso e piange, con il suo fumetto
    clearTimeout(moodTimer); setMood('triste');
    brokkyBubble.classList.add('show');
  } else {
    flashMood('triste',2600);
  }
});

// celebrazione: ingrandimento graduale ~2s, poi caricamento pagina a fine animazione
function celebra(variant,callback){
  clearTimeout(moodTimer);
  brokkyBubble.classList.remove('show');   // via il fumetto offeso: ora si festeggia
  // spengo pulito lo stato triste PRIMA di celebrare, per evitare che le animazioni
  // drop/triste vengano interrotte mentre parte la transizione di 2s (causa del lag)
  brocco.className='';
  pozza.style.transition='width .4s ease,height .4s ease,opacity .4s ease';
  pozza.style.opacity='0';pozza.style.width='0';pozza.style.height='0';
  // attendo due frame cosi il reset e' applicato prima di far partire la celebrazione
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    const cls=variant==='A'?'celebraA':'celebraB';
    setMood(cls);
    if(variant==='B') brocco.classList.add('anim');
    burstHearts(variant==='A'?20:28, variant);
    setTimeout(callback,2000);
  }));
}
// scelta corrente, usata dallo Step 2 per decidere quale sub-root caricare
let chosen=null;
bSi.addEventListener('click',()=>{ chosen='A'; celebra('A',goToPage); });
bTii.addEventListener('click',()=>{ chosen='B'; celebra('B',goToPage); });

// transizione alla pagina dopo la scelta: Broccoletto resta come elemento attivo
function goToPage(){
  // reindirizza alla sub-root scelta, passando la variante via URL
  if(chosen==='A') location.href='seria.html?v=A';
  else location.href='tiii.html?v=B';
}

// cuori gialli al tocco (strato globale) - piu' di uno per tocco, effetto piu' percettibile
function spawnHeart(x,y){
  const h=document.createElement('div');
  h.className='heartfx';h.textContent='♥';
  const dx=(Math.random()-0.5)*40, dy=(Math.random()-0.5)*20;
  h.style.left=(x+dx)+'px';h.style.top=(y+dy)+'px';
  h.style.fontSize=(16+Math.random()*14)+'px';
  h.style.color=Math.random()>0.5?'var(--giallo)':'var(--rosa-medio)';
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),1000);
}
function tapHearts(x,y){ const n=3+Math.floor(Math.random()*2); for(let i=0;i<n;i++) spawnHeart(x,y); }
function burstHearts(n,variant){
  const cx=window.innerWidth/2, cy=window.innerHeight/2;
  for(let i=0;i<n;i++){
    setTimeout(()=>{
      const h=document.createElement('div');
      h.className='heartfx';
      if(variant==='B'){ // tiii: piu' colori, simboli vari, caotico
        h.textContent=['♥','★','✿','♥'][i%4];
        h.style.color=['var(--giallo)','var(--rosa-medio)','#ff8fb0','#a3e0ff'][i%4];
        h.style.fontSize=(18+Math.random()*20)+'px';
      } else { // si: giallo/rosa, composto
        h.textContent='♥';
        h.style.color=Math.random()>0.5?'var(--giallo)':'var(--rosa-medio)';
        h.style.fontSize=(16+Math.random()*14)+'px';
      }
      h.style.left=(cx+(Math.random()-0.5)*window.innerWidth*0.7)+'px';
      h.style.top=(cy+(Math.random()-0.5)*window.innerHeight*0.5)+'px';
      document.body.appendChild(h);
      setTimeout(()=>h.remove(),1000);
    }, i*(1800/n));
  }
}
document.addEventListener('pointerdown',e=>tapHearts(e.clientX,e.clientY));

// ====== RIENTRO (tasto "indietro") ======
// tornando dalle pagine seria/tiii, iOS ripristina la pagina dalla bfcache cosi' com'era:
// cioe' con Brokky gigante che festeggia. La riporto pulita alla schermata di scelta.
function resetToChoice(){
  clearTimeout(moodTimer);
  setMood('');
  brokkyBubble.classList.remove('show');
  brocco.classList.remove('hidden');
  sBusta.classList.add('hidden');
  sScelta.classList.remove('hidden');
  chosen=null;
  noTaps=0;
  bNo.removeAttribute('style');     // "no" torna pieno
  pozza.removeAttribute('style');   // pozzanghera azzerata
}
window.addEventListener('pageshow',e=>{ if(e.persisted) resetToChoice(); });
</script>
